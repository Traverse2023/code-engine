version: '3.8'

services:
  localstack:
    image: localstack/localstack
    environment:
      - SERVICES=dynamodb
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"

  app:
    build: .
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DYNAMODB_ENDPOINT=http://localstack:4566
    depends_on:
      - localstack
    volumes:
      - .:/app
    ports:
      - "4401:4401"
    command: python3 -m flask run --host=0.0.0.0 --port=4401